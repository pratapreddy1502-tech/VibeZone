name: Keep Render Backend Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping VibeZone backend
        run: |
          curl --fail --show-error --silent --retry 3 --retry-delay 10 --max-time 60 \
            https://vibezone-mwg7.onrender.com/health
